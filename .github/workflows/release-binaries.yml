name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to when dry_run is false"
        required: false
        type: string
      dry_run:
        description: "Build and package without uploading release assets"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: ssh-mcp
          - os: macos-13
            target: x86_64-apple-darwin
            binary: ssh-mcp
          - os: macos-14
            target: aarch64-apple-darwin
            binary: ssh-mcp

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # pin-audit:2026-05-21 34e1148 | v4

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Codesign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - "target/${{ matrix.target }}/release/${{ matrix.binary }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          version="$(cargo pkgid | sed 's/.*#//')"
          archive_base="ssh-mcp-v${version}-${{ matrix.target }}"
          staging="dist/${archive_base}"

          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${staging}/"
          cp README.md LICENSE-APACHE LICENSE-MIT "${staging}/"
          tar -czf "dist/${archive_base}.tar.gz" -C dist "${archive_base}"

      - name: Upload release asset
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG}" ]; then
            echo "release tag is required when dry_run is false" >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" dist/*.tar.gz --clobber

      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        shell: bash
        run: ls -lh dist/*.tar.gz

  deb:
    name: Build Debian package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # pin-audit:2026-05-21 34e1148 | v4

      - name: Install cargo-deb
        run: cargo install --locked cargo-deb

      - name: Build Debian package
        run: cargo deb --locked --output dist

      - name: Upload release asset
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG}" ]; then
            echo "release tag is required when dry_run is false" >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" dist/*.deb --clobber

      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        shell: bash
        run: ls -lh dist/*.deb
