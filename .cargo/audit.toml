# cargo-audit configuration. Mirrors deny.toml's advisories.ignore so
# the two Rust supply-chain tools agree on what is accepted.

[advisories]
ignore = [
    # See deny.toml for the rationale. HekateSSH is an SSH client
    # connecting to operator-trusted hosts; the Marvin Attack requires
    # the SSH peer to observe RSA timing, which is the host we already
    # trust.
    "RUSTSEC-2023-0071",
]
